#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Garrett"
email = "garrett.o@agilebits.com"

[signing]
behavior = "force"
backend = "ssh"
backends.ssh.program = "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDF+VTxDbi6XBbGNueF5ntXO6iT3v2idQed64vYkWSvh"

[git]
private-commits = "description(regex:'^private(\\(.+\\))?:.+')"
push-new-bookmarks = true
push-bookmark-prefix = "garrett/push-"

[ui]
merge-editor = "nvimdiff"
diff-editor = ":builtin"
show-cryptographic-signatures = true
bookmark-list-sort-keys = ["committer-date-"]

[merge-tools.nvimdiff]
program = "sh"
merge-args = [
	"-c",
	'exec $EDITOR "$@"',
	"--",
	"-c",
	"JJdiff",
	"-d",
	"$left",
	"$output",
	"$right"
]

[template-aliases]
"format_short_cryptographic_signature(sig)" = "if(sig, '', '(no sig)')"

[hints]
resolving-conflicts = false
